<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ description }}" />
  <title>{{ title }} — UTO</title>
  <link rel="stylesheet" href="{{ base_path }}style.css" />
  <link rel="icon" type="image/svg+xml" href="{{ base_path }}favicon.svg" />
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ base_path }}" class="nav-logo">
        <span class="logo-u">U</span><span class="logo-t">T</span><span class="logo-o">O</span>
      </a>
      <ul class="nav-links">
        <li><a href="{{ base_path }}">Home</a></li>
        <li><a href="{{ base_path }}getting-started/">Getting Started</a></li>
        <li><a href="{{ base_path }}troubleshooting/">Troubleshooting</a></li>
        <li><a href="{{ base_path }}early-access/">Early Access</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock content %}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <p class="footer-tagline">
        UTO — The Automation Revolution
      </p>
      <p class="footer-license">Proprietary &amp; Confidential</p>
    </div>
  </footer>
</body>
</html>
